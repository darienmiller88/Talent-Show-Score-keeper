{{ define "title" }}Talent Show{{ end }}

{{ define "css" }}
<link rel="stylesheet" href="../static/css/TalentShow.css">
{{ end }}

{{ define "js" }}{{ end }}

{{ define "content" }}
<div class="talent-show-header">
    {{ .user}}
</div>

<div class="talent-grid">
  {{ range .Cards }}
  <div id="card-{{ .ID }}">
    {{ template "talentcard" . }}
  </div>
  {{ end }}
</div>
{{ end }}
