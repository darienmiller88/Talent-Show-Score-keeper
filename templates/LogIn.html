<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../static/css/Base.css">
        <link rel="stylesheet" href="../static/css/LogIn.css">
        <title>Log in</title>
    </head>
    <body>
        <div style="display: flex; align-items: center; justify-content: center; min-height: 85vh;">
            <div class="glass" style="max-width: 25rem; width: 100%;">
                <h2 class="gradient-text" style="text-align: center; font-size: 2rem; margin-bottom: 2rem;">Sign In</h2>
                <form method="post" action="/log-in" style="display: flex; flex-direction: column; gap: 1rem;">
                    <label style="font-size: 0.8rem; color: var(--primary);">USERNAME</label>
                    <input type="text" name="username" placeholder="Enter username">
                    
                    <label style="font-size: 0.8rem; color: var(--primary);">PASSWORD</label>
                    <input type="password" name="password" placeholder="••••••••">
                    
                    <button class="btn btn-primary" style="width: 100%;">Access Scoreboard</button>
                </form>
            </div>
        </div>
    </body>
</html>
