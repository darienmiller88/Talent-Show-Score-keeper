{{ define "title" }}Point Totals{{ end }}

{{ define "css" }}{{ end }}

{{ define "js" }}{{ end }}

{{ define "content" }}
<h1 class="gradient-text" style="margin-bottom: 1.5rem;">Point Totals</h1>

<div class="glass">
    {{ range .Totals }}
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--glass-border);">
        <span style="color: var(--text-white); flex: 1;">{{ .Name }}</span>
        <span style="color: var(--primary); font-weight: 700; font-size: 1.1rem;">{{ printf "%.1f" .Score }}</span>
    </div>
    {{ end }}
</div>
{{ end }}
